<!DOCTYPE html>
<!-- saved from url=(0051)https://getbootstrap.com/docs/4.0/examples/sign-in/ -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>NewBank</title>

    {% load static %}
    <link rel="icon" href="{% static 'home/nblogo.png' %}">
    <!-- Bootstrap core CSS -->
    <link href="{% static 'accounts/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="{% static 'accounts/signin.css' %}" rel="stylesheet">
  </head>

  <body class="text-center">
    <form class="form-signin" method="post" action="{% url 'accounts:login' %}">
      {% csrf_token %}
      <img class="mb-4" src="{% static 'home/nblogo.png' %}" alt="" width="72">
      <h1 class="h3 mb-3 font-weight-normal">Please log in</h1>
      <br>
      
      {% if error_message %}
          <div class="alert alert-danger" role="alert">
              {{ error_message }}
          </div>
      {% endif %}

      <label for="inputUsername" class="sr-only">Username</label>
      <input type="text" id="inputUsername" name="username" class="form-control" placeholder="admin@newBank.uz" required="" autofocus="">
      <br>

      <label for="inputPassword" class="sr-only">Password</label>
      <input type="password" id="inputPassword" name="password" class="form-control" placeholder="Password" required="">
      <br>
      
      <p>Don't have an account?<a href="{% url 'accounts:register' %}"> Register here</a></p>
      <br>
      <button class="btn btn-lg btn-primary btn-block" type="submit">Log in</button>
      <p class="mt-5 mb-3 text-muted">Copyright © 2026 NewBank</p>
    </form>


</body></html>
